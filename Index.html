<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./Img/Favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="Style.css">
    <title>Sorveteria</title>
</head>
<body>
    <main class="container">
        <div class="container-titulo">
            <h1>🍨 Sorveteria</h1>
        </div>

        <form>
            <h3>Escolha o seu produto</h3>
 
            <label>
                <input type="radio" name="produto" value="1">
                <strong>Copinho 🥛</strong>
            </label>

            <label>
                <input type="radio" name="produto" value="2">
                <strong>Casquinha 🍦</strong>
            </label>

            <label>
                <input type="radio" name="produto" value="4">
                <strong>Milk-Shake 🥤</strong>
            </label>

             <label>
                <input type="radio" name="produto" value="5">
                <strong>Sundae 🍨</strong>
            </label>

        <details>
            <summary><strong>Sabores</strong></summary>
            <ol>
                <strong>Massas:</strong> Chocolate, Morango, Baunilha, Creme, Limão, Céu Azul, Ovomaltine, Café e Ninho
            </ol>
        </details>

        <h3> 🔢 Quantidade:</h3>
        <input type="number" id="quantidade" min="1">

        <button type="button" class="form-botao" onclick="comprarProdutos()">Adicionar</button>

        <h3> 💵 Escolha a forma de pagamento:</h3>

    <input type="radio" name="pagamento" value="Pix" onclick="mostrarCartao()">Pix<br>
    <input type="radio" name="pagamento" value="Cartão" onclick="mostrarCartao()">Cartão<br>
    <input type="radio" name="pagamento" value="Dinheiro" onclick="mostrarCartao()">Dinheiro

    <div id="opcoes-cartao" style="display: none;">
    <h3>💳 Tipo de cartão:</h3>

    <input type="radio" name="tipoCartao" value="Crédito" onclick="mostrarParcelamento()">Crédito<br>
    <input type="radio" name="tipoCartao" value="Débito" onclick="mostrarParcelamento()">Débito
    
    </div>

    <div id="parcelamento" style="display: none;">
    <h3>📆 Parcelamento:</h3>

    <select id="parcelas">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
        <option value="5">5x</option>
        <option value="6">6x</option>
        <option value="7">7x</option>
        <option value="8">8x</option>
        <option value="9">9x</option>
        <option value="10">10x</option>
        <option value="11">11x</option>
        <option value="12">12x</option>
    </select>
    </div>

        <h3> 🛒 Carrinho</h3>
        <p id="carrinho"></p>

    <button type="button" class="form-botao" onclick="finalizarCompra()">Finalizar Compra</button>
    </main>
<script src="Script.Js"></script>
</body>
</html>
